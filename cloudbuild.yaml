# GitHub push → Cloud Run via Node.js buildpack (no Dockerfile).
# Cloud Run step mirrors scripts/deploy-code4community-gcp.sh.
# Firebase Hosting rewrites deploy after Cloud Run in the same build.
timeout: 2400s

substitutions:
  _SERVICE: code4community-app
  _REGION: us-east4
  _BUILD_AND_RUNTIME_ENV: "NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyAnMqlekmlRnvyQeujfKoUPIYu8JtBDTDA,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=code4community26.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=code4community26,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=code4community26.firebasestorage.app,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=698474286096,NEXT_PUBLIC_FIREBASE_APP_ID=1:698474286096:web:0b23171803dac353ec4e95,NEXT_PUBLIC_SITE_URL=https://code4community26.web.app,NEXT_PUBLIC_RECAPTCHA_SITE_KEY=6LfPCPMsAAAAAJoZ0jAGk2KGfA42KptDBhTRgz2J,NEXT_PUBLIC_WC_FORM_ID=1nRtpON5vn7gNOgWaMjcK7v9Fh1EXPkZXsXuUUL1sZDE"

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --source=.
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=20
      - --port=8080
      - --set-build-env-vars=${_BUILD_AND_RUNTIME_ENV},NEXT_DEPLOYMENT_ID=$COMMIT_SHA
      - --set-env-vars=${_BUILD_AND_RUNTIME_ENV},NEXT_DEPLOYMENT_ID=$COMMIT_SHA
      - --set-secrets=WRITING_CENTER_GOOGLE_FORM_SYNC_SECRET=writing-center-google-form-sync:latest
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: DeployHosting
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npx -y firebase-tools@latest deploy --only hosting --project code4community26 --non-interactive

options:
  logging: CLOUD_LOGGING_ONLY
